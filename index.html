<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/vexvel_logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VexVel · CRM + Agentes IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>

<body>
  <div id="root"></div>
  <script>
    // Siempre arrancar desde el tope al cargar o refrescar
    history.scrollRestoration = 'manual';
    window.scrollTo(0, 0);
  </script>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // Scroll to hash section after React renders (for external links like email CTAs)
    (function() {
      var hash = window.location.hash;
      if (!hash) return;
      var attempts = 0;
      var maxAttempts = 25; // 25 x 200ms = 5 seconds max
      var interval = setInterval(function() {
        var el = document.querySelector(hash);
        if (el) {
          clearInterval(interval);
          setTimeout(function() {
            el.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }, 300);
        } else if (++attempts >= maxAttempts) {
          clearInterval(interval);
        }
      }, 200);
    })();
  </script>
</body>

</html>
